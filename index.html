<!DOCTYPE html>
<html>
<head>
  <title>Spin Your Color</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #1a1a1a, #000);
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    h1 {
      margin-top: 40px;
      font-size: 2.5rem;
      letter-spacing: 2px;
    }

    .wheel-container {
      position: relative;
      width: 300px;
      height: 300px;
      margin: 50px auto;
    }

    canvas {
      border-radius: 50%;
      box-shadow: 0 0 30px rgba(255,255,255,0.1);
    }

    .pointer {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
    }

    button {
      padding: 15px 40px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(45deg, gold, orange);
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    #result {
      margin-top: 30px;
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>🎡 Spin Your Color</h1>

<div class="wheel-container">
  <div class="pointer">🔻</div>
  <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
const colors = ["Red","Blue","Green","Yellow","Purple","Orange"];
const colorValues = ["#ff4d4d","#4da6ff","#4dff88","#ffff66","#b84dff","#ff944d"];

let canvas = document.getElementById("wheel");
let ctx = canvas.getContext("2d");

let angle = 0;
let spinning = false;

function drawWheel(){
  let arc = 2 * Math.PI / colors.length;

  for(let i=0;i<colors.length;i++){
    ctx.beginPath();
    ctx.fillStyle = colorValues[i];
    ctx.moveTo(150,150);
    ctx.arc(150,150,150, arc*i, arc*(i+1));
    ctx.fill();

    ctx.save();
    ctx.translate(150,150);
    ctx.rotate(arc*i + arc/2);
    ctx.fillStyle = "black";
    ctx.fillText(colors[i], 60, 10);
    ctx.restore();
  }
}

drawWheel();

function spin(){
  if(spinning) return;
  spinning = true;

  document.getElementById("spinSound").play();

  let spinAngle = Math.random()*2000 + 3000;
  let duration = 3000;
  let start = null;

  function animate(time){
    if(!start) start = time;
    let progress = time - start;

    angle = spinAngle * easeOut(progress/duration);
    canvas.style.transform = `rotate(${angle}deg)`;

    if(progress < duration){
      requestAnimationFrame(animate);
    } else {
      finishSpin();
    }
  }

  requestAnimationFrame(animate);
}

function easeOut(t){
  return 1 - Math.pow(1 - t, 3);
}

function finishSpin(){
  let degrees = angle % 360;
  let segment = 360 / colors.length;
  let index = Math.floor((360 - degrees) / segment) % colors.length;

  let selectedColor = colors[index];

  document.getElementById("result").innerText = "Your Color: " + selectedColor;

  setTimeout(()=>{
    window.location.href =
    "https://docs.google.com/forms/d/e/1FAIpQLScAAtpH272PMVM4Cx544X72GLNP1FbWpeGVrslRwr9G4Fh9VA/viewform?usp=pp_url&entry.2059852741=" + selectedColor;
  }, 2000);
}
</script>

</body>
</html>
